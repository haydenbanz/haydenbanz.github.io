<script>document.addEventListener('DOMContentLoaded', function () {
    const sendDataButton = document.getElementById('sendDataButton');
    sendDataButton.addEventListener('click', sendUserDataToServer);
});

function sendUserDataToServer() {
    const userData = {
        // Define your user data here
        // For example:
        username: 'john_doe',
        email: 'john@example.com'
    };

    fetch('https://gratis-jeweled-eyelash.glitch.me:3000/receiveUserData', {
        method: 'POST', // Use POST request
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(userData),
    })
        .then(response => response.json())
        .then(data => {
            console.log(data);
            // You can display a success message to the user if needed
        })
        .catch(error => {
            console.error(error);
            // Handle errors here
        });
}
